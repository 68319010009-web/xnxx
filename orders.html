<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ประวัติคำสั่งซื้อ - Mini E-Commerce</title>
<link rel="stylesheet" href="orders.css" />
</head>
<body>

<header>
  <h1>ประวัติคำสั่งซื้อ</h1>
  <button id="backBtn">กลับหน้าร้าน</button>
</header>

<main>
  <div id="ordersList">
    <!-- รายการคำสั่งซื้อจะมาแสดงตรงนี้ -->
  </div>
</main>

<script>
  let currentUser = localStorage.getItem('currentUser');
  if(!currentUser){
    alert('กรุณาเข้าสู่ระบบก่อน');
    window.location.href = 'login.html';
  }

  const ordersList = document.getElementById('ordersList');
  const backBtn = document.getElementById('backBtn');

  backBtn.addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  function renderOrders(){
    const users = JSON.parse(localStorage.getItem('miniUsers') || '{}');
    const user = users[currentUser];
    if(!user || !user.orders || user.orders.length === 0){
      ordersList.innerHTML = '<p>ยังไม่มีคำสั่งซื้อ</p>';
      return;
    }

    ordersList.innerHTML = '';
    user.orders.slice().reverse().forEach(order => {
      const div = document.createElement('div');
      div.className = 'order-card';

      let itemsHtml = '';
      order.items.forEach(i => {
        itemsHtml += `<li>${i.name} x${i.qty} = ${(i.price*i.qty).toLocaleString()} บาท</li>`;
      });

      div.innerHTML = `
        <h3>คำสั่งซื้อ #${order.id}</h3>
        <p>วันที่: ${order.date}</p>
        <p>ผู้รับ: ${order.fullname}</p>
        <p>ที่อยู่: ${order.address}</p>
        <p>เบอร์โทร: ${order.phone}</p>
        <p>วิธีชำระเงิน: ${order.paymentMethod === 'bank' ? 'โอนเงินผ่านธนาคาร' : 'เก็บเงินปลายทาง'}</p>
        <p>สถานะ: ${order.paid ? '<span class="paid">ชำระเงินแล้ว</span>' : '<span class="not-paid">รอชำระเงิน</span>'}</p>
        <ul>${itemsHtml}</ul>
        <p><strong>ราคารวม: ${order.totalPrice.toLocaleString()} บาท</strong></p>
      `;
      ordersList.appendChild(div);
    });
  }

  renderOrders();
</script>

</body>
</html>
